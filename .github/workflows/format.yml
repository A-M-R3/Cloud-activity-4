name: Format Check CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.1.0 ruff==0.1.14

      - name: Run Black formatter check
        run: black --config .black --check --diff .

      - name: Run Ruff linter check
        run: ruff check .